name: iOS-template
options:
  bundleIdPrefix: com.template
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
  xcodeVersion: "15.0"

packages:
  TemplateDomain:
    path: Packages/TemplateDomain
  TemplateData:
    path: Packages/TemplateData

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  iOS-template:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: TemplateDomain
        product: TemplateDomain
      - package: TemplateData
        product: TemplateData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.template.ios-template
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  iOS-template:
    build:
      targets:
        iOS-template: all
    run:
      config: Debug
    test:
      config: Debug
